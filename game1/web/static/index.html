<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>game1 operator dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <div class="brand">game1</div>
          <p class="brand-copy">Operator dashboard for local runs, snapshots, lab reports, and graph inspection.</p>
        </div>

        <nav class="nav" aria-label="Primary">
          <button type="button" class="nav-button active" data-view="dashboard">Dashboard</button>
          <button type="button" class="nav-button" data-view="run">Run</button>
          <button type="button" class="nav-button" data-view="lab">Lab</button>
          <button type="button" class="nav-button" data-view="graph">Graph</button>
          <button type="button" class="nav-button" data-view="snapshots">Snapshots</button>
          <button type="button" class="nav-button" data-view="info">Info</button>
        </nav>

        <div class="sidebar-footer">
          <span class="sidebar-pill" id="server-status">local</span>
          <span class="sidebar-pill" id="server-run-status">stopped</span>
        </div>
      </aside>

      <div class="main-shell">
        <header class="topbar">
          <div class="topbar-copy">
            <p class="topbar-eyebrow">Operator panel</p>
            <h1 id="topbar-title">Dashboard</h1>
            <p class="topbar-subtitle" id="topbar-subtitle">Fast controls, current metrics, and immediate analysis.</p>
          </div>
          <div class="topbar-meta" id="topbar-meta"></div>
        </header>

        <main class="workspace">
          <section id="view-dashboard" class="view active">
            <div id="dashboard-content"></div>
          </section>

          <section id="view-run" class="view">
            <div id="run-content"></div>
          </section>

          <section id="view-lab" class="view">
            <div id="lab-content"></div>
          </section>

          <section id="view-graph" class="view">
            <div id="graph-content"></div>
          </section>

          <section id="view-snapshots" class="view">
            <div id="snapshots-content"></div>
          </section>

          <section id="view-info" class="view">
            <div id="info-content"></div>
          </section>
        </main>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
